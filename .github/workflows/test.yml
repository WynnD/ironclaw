name: CI
on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast-fail on formatting before expensive compilation
  format:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # Combined clippy + tests per feature config — clippy compiles all targets,
  # so `cargo test` afterwards only links and runs (near-free).
  check:
    name: Check (${{ matrix.name }})
    needs: format
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: all-features
            flags: "--all-features"
          - name: default
            flags: ""
          - name: libsql-only
            flags: "--no-default-features --features libsql"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: check-${{ matrix.name }}
      - name: Clippy
        run: cargo clippy --all --benches --tests --examples ${{ matrix.flags }} -- -D warnings
      - name: Tests
        run: cargo test ${{ matrix.flags }} -- --nocapture

  telegram-tests:
    name: Telegram Channel Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: telegram
      - name: Run Telegram Channel Tests
        run: cargo test --manifest-path channels-src/telegram/Cargo.toml -- --nocapture

  # PR builds: validate Dockerfile on ubuntu-latest with GHA cache.
  # Main builds: build + push in one shot on self-hosted with registry cache.
  docker-build:
    name: Docker Build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          cache-from: type=gha,scope=docker-build
          cache-to: type=gha,mode=max,scope=docker-build

  # Self-hosted: build + push in one job using local registry cache.
  # Registry cache is fast (local network) and persists across ephemeral runners.
  push-image:
    name: Push Image
    needs: [check, telegram-tests]
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: arc-runner-set-ironclaw
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Check if this run is latest main commit
        id: main_head
        env:
          GITHUB_SHA_VAL: ${{ github.sha }}
        run: |
          set -euo pipefail
          latest_main_sha="$(git ls-remote --heads origin main | awk '{print $1}')"
          if [[ -z "$latest_main_sha" ]]; then
            echo "Could not resolve origin/main head"
            exit 1
          fi
          if [[ "$GITHUB_SHA_VAL" == "$latest_main_sha" ]]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
            echo "This run is at latest main commit: $GITHUB_SHA_VAL"
          else
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
            echo "Skipping push-image for stale commit $GITHUB_SHA_VAL (latest main: $latest_main_sha)"
          fi
      - name: Derive image tag
        id: meta
        if: steps.main_head.outputs.is_latest == 'true'
        env:
          SHA: ${{ github.sha }}
        run: echo "tag=sha-$(echo "$SHA" | cut -c1-7)" >> "$GITHUB_OUTPUT"
      - name: Build and push image
        if: steps.main_head.outputs.is_latest == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            registry.wynndrahorad.com/ironclaw:latest
            registry.wynndrahorad.com/ironclaw:${{ steps.meta.outputs.tag }}
          cache-from: type=registry,ref=registry.wynndrahorad.com/ironclaw:buildcache
          cache-to: type=registry,ref=registry.wynndrahorad.com/ironclaw:buildcache,mode=max

  # Roll-up job for branch protection
  run-tests:
    name: Run Tests
    runs-on: ubuntu-latest
    if: always()
    needs: [format, check, telegram-tests, docker-build, push-image]
    steps:
      - name: Check results
        env:
          FORMAT_RESULT: ${{ needs.format.result }}
          CHECK_RESULT: ${{ needs.check.result }}
          TELEGRAM_RESULT: ${{ needs.telegram-tests.result }}
          DOCKER_RESULT: ${{ needs.docker-build.result }}
          PUSH_RESULT: ${{ needs.push-image.result }}
        run: |
          if [[ "$FORMAT_RESULT" != "success" || \
                "$CHECK_RESULT" != "success" || \
                "$TELEGRAM_RESULT" != "success" ]]; then
            echo "Required jobs failed"
            exit 1
          fi
          # docker-build only runs on PRs; push-image only on main
          if [[ "$DOCKER_RESULT" == "failure" ]]; then
            echo "Docker build failed"
            exit 1
          fi
          if [[ "$PUSH_RESULT" == "failure" ]]; then
            echo "Image push failed"
            exit 1
          fi
